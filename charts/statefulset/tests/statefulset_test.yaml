suite: StatefulSet template tests
templates:
  - templates/statefulset.yaml
tests:
  - it: should render a StatefulSet by default
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: StatefulSet
      - equal:
          path: apiVersion
          value: apps/v1

  - it: should use the name for metadata.name
    set:
      name: my-db
    asserts:
      - equal:
          path: metadata.name
          value: my-db

  - it: should include standard labels
    asserts:
      - isNotEmpty:
          path: metadata.labels["helm.sh/chart"]
      - isNotEmpty:
          path: metadata.labels["app.kubernetes.io/name"]
      - isNotEmpty:
          path: metadata.labels["app.kubernetes.io/instance"]

  - it: should set replicas from values
    set:
      replicas: 3
    asserts:
      - equal:
          path: spec.replicas
          value: 3

  - it: should set serviceName to the fullname
    set:
      name: my-db
    asserts:
      - equal:
          path: spec.serviceName
          value: my-db

  - it: should set podManagementPolicy from values
    set:
      podManagementPolicy: Parallel
    asserts:
      - equal:
          path: spec.podManagementPolicy
          value: Parallel

  - it: should set updateStrategy type from values
    set:
      updateStrategy.type: OnDelete
    asserts:
      - equal:
          path: spec.updateStrategy.type
          value: OnDelete

  - it: should set the container image from values
    set:
      image.repository: postgres
      image.tag: "15"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: postgres:15

  - it: should expose the container port from service.targetPort
    set:
      service.targetPort: 5432
    asserts:
      - equal:
          path: spec.template.spec.containers[0].ports[0].containerPort
          value: 5432
      - equal:
          path: spec.template.spec.containers[0].ports[0].name
          value: http

  - it: should include serviceAccountName when serviceAccount.create is true
    set:
      name: my-db
      serviceAccount.create: true
    asserts:
      - equal:
          path: spec.template.spec.serviceAccountName
          value: my-db

  - it: should not include serviceAccountName when serviceAccount.create is false
    set:
      serviceAccount.create: false
    asserts:
      - notExists:
          path: spec.template.spec.serviceAccountName

  - it: should mount the data volume when persistence.enabled is true
    set:
      persistence.enabled: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: data
            mountPath: /data

  - it: should not mount data volume when persistence.enabled is false
    set:
      persistence.enabled: false
    asserts:
      - notExists:
          path: spec.template.spec.containers[0].volumeMounts

  - it: should render a volumeClaimTemplate when persistence.enabled is true
    set:
      persistence.enabled: true
      persistence.size: 10Gi
      persistence.accessMode: ReadWriteOnce
    asserts:
      - isNotEmpty:
          path: spec.volumeClaimTemplates
      - equal:
          path: spec.volumeClaimTemplates[0].metadata.name
          value: data
      - equal:
          path: spec.volumeClaimTemplates[0].spec.resources.requests.storage
          value: 10Gi
      - equal:
          path: spec.volumeClaimTemplates[0].spec.accessModes[0]
          value: ReadWriteOnce

  - it: should not render volumeClaimTemplates when persistence.enabled is false
    set:
      persistence.enabled: false
    asserts:
      - notExists:
          path: spec.volumeClaimTemplates

  - it: should set storageClassName when persistence.storageClass is set
    set:
      persistence.enabled: true
      persistence.storageClass: fast-ssd
    asserts:
      - equal:
          path: spec.volumeClaimTemplates[0].spec.storageClassName
          value: fast-ssd

  - it: should not set storageClassName when persistence.storageClass is empty
    set:
      persistence.enabled: true
      persistence.storageClass: ""
    asserts:
      - notExists:
          path: spec.volumeClaimTemplates[0].spec.storageClassName

  - it: should set env variables when provided
    set:
      env:
        - name: POSTGRES_DB
          value: mydb
    asserts:
      - equal:
          path: spec.template.spec.containers[0].env[0].name
          value: POSTGRES_DB

  - it: should set livenessProbe when provided
    set:
      livenessProbe:
        httpGet:
          path: /health
          port: http
        initialDelaySeconds: 10
    asserts:
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.path
          value: /health

  - it: should not set livenessProbe when empty
    set:
      livenessProbe: {}
    asserts:
      - notExists:
          path: spec.template.spec.containers[0].livenessProbe

  - it: should set readinessProbe when provided
    set:
      readinessProbe:
        httpGet:
          path: /ready
          port: http
    asserts:
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.path
          value: /ready

  - it: should set resource requests and limits from values
    set:
      resources.requests.cpu: 500m
      resources.limits.memory: 1Gi
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources.requests.cpu
          value: 500m
      - equal:
          path: spec.template.spec.containers[0].resources.limits.memory
          value: 1Gi

  - it: should set nodeSelector when provided
    set:
      nodeSelector:
        storage: nvme
    asserts:
      - equal:
          path: spec.template.spec.nodeSelector.storage
          value: nvme

  - it: should set pod labels from podLabels
    set:
      podLabels:
        team: data
    asserts:
      - equal:
          path: spec.template.metadata.labels["team"]
          value: data

  - it: should set pod annotations from podAnnotations
    set:
      podAnnotations:
        backup.velero.io/backup-volumes: data
    asserts:
      - equal:
          path: spec.template.metadata.annotations["backup.velero.io/backup-volumes"]
          value: data

  - it: should add imagePullSecrets when provided
    set:
      imagePullSecrets:
        - registry-secret
    asserts:
      - equal:
          path: spec.template.spec.imagePullSecrets[0].name
          value: registry-secret
