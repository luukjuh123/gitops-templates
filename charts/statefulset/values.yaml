# Default values for statefulset chart
# Override these in your galaxy's values file

# -- Application name (used for resource naming)
name: statefulset

# -- Number of pod replicas
replicas: 1

image:
  # -- Container image repository
  repository: nginx
  # -- Container image tag
  tag: "latest"
  # -- Image pull policy
  pullPolicy: IfNotPresent

# -- Image pull secrets (list of secret names)
imagePullSecrets: []

# -- Pod management policy (OrderedReady or Parallel)
podManagementPolicy: OrderedReady

updateStrategy:
  # -- Update strategy type (RollingUpdate or OnDelete)
  type: RollingUpdate

serviceAccount:
  # -- Whether to create a ServiceAccount
  create: true
  # -- ServiceAccount name (defaults to release fullname)
  name: ""
  # -- Annotations for the ServiceAccount
  annotations: {}

service:
  # -- Service port
  port: 80
  # -- Container target port
  targetPort: 80
  # -- Additional service annotations
  annotations: {}

configMap:
  # -- Whether to create a ConfigMap
  enabled: false
  # -- ConfigMap data (key-value pairs)
  data: {}

persistence:
  # -- Whether to enable persistent storage
  enabled: true
  # -- Storage class name (empty = cluster default)
  storageClass: ""
  # -- Access mode for the persistent volume claim
  accessMode: ReadWriteOnce
  # -- Size of the persistent volume claim
  size: 1Gi

resources:
  # -- Resource requests
  requests:
    cpu: 100m
    memory: 128Mi
  # -- Resource limits
  limits:
    cpu: 500m
    memory: 256Mi

# -- Pod labels (merged with standard labels)
podLabels: {}

# -- Pod annotations
podAnnotations: {}

# -- Node selector
nodeSelector: {}

# -- Tolerations
tolerations: []

# -- Affinity rules
affinity: {}

# -- Container liveness probe
livenessProbe: {}
#  httpGet:
#    path: /health
#    port: http
#  initialDelaySeconds: 10
#  periodSeconds: 10

# -- Container readiness probe
readinessProbe: {}
#  httpGet:
#    path: /ready
#    port: http
#  initialDelaySeconds: 5
#  periodSeconds: 5

# -- Additional environment variables
env: []
#  - name: MY_VAR
#    value: "my-value"

# -- Additional volume mounts
volumeMounts: []

# -- Additional volumes
volumes: []
