suite: ServiceAccount template tests
templates:
  - templates/serviceaccount.yaml
tests:
  - it: should render a ServiceAccount when serviceAccount.create is true (default)
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ServiceAccount
      - equal:
          path: apiVersion
          value: v1

  - it: should not render when serviceAccount.create is false
    set:
      serviceAccount.create: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should use the fullname for metadata.name when serviceAccount.name is empty
    set:
      name: my-app
    asserts:
      - equal:
          path: metadata.name
          value: my-app

  - it: should use a custom name when serviceAccount.name is set
    set:
      serviceAccount.name: custom-sa
    asserts:
      - equal:
          path: metadata.name
          value: custom-sa

  - it: should include standard labels
    asserts:
      - isNotEmpty:
          path: metadata.labels["helm.sh/chart"]
      - isNotEmpty:
          path: metadata.labels["app.kubernetes.io/name"]
      - isNotEmpty:
          path: metadata.labels["app.kubernetes.io/instance"]

  - it: should not include annotations block when serviceAccount.annotations is empty
    asserts:
      - notExists:
          path: metadata.annotations

  - it: should render annotations when serviceAccount.annotations are provided
    set:
      serviceAccount.annotations.iam-role: my-role
    asserts:
      - equal:
          path: metadata.annotations["iam-role"]
          value: my-role
