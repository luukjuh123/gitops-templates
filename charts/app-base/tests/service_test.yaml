suite: Service template tests
templates:
  - templates/service.yaml
tests:
  - it: should render a Service by default
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Service
      - equal:
          path: apiVersion
          value: v1

  - it: should not render when service.enabled is false
    set:
      service.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should use the name for metadata.name
    set:
      name: my-app
    asserts:
      - equal:
          path: metadata.name
          value: my-app

  - it: should include standard labels
    asserts:
      - isNotEmpty:
          path: metadata.labels["helm.sh/chart"]
      - isNotEmpty:
          path: metadata.labels["app.kubernetes.io/name"]
      - isNotEmpty:
          path: metadata.labels["app.kubernetes.io/instance"]

  - it: should default to ClusterIP type
    asserts:
      - equal:
          path: spec.type
          value: ClusterIP

  - it: should set service type from values
    set:
      service.type: LoadBalancer
    asserts:
      - equal:
          path: spec.type
          value: LoadBalancer

  - it: should set port and targetPort from values
    set:
      service.port: 8080
      service.targetPort: 8080
    asserts:
      - equal:
          path: spec.ports[0].port
          value: 8080
      - equal:
          path: spec.ports[0].targetPort
          value: 8080

  - it: should set protocol to TCP and name to http
    asserts:
      - equal:
          path: spec.ports[0].protocol
          value: TCP
      - equal:
          path: spec.ports[0].name
          value: http

  - it: should include nodePort when type is NodePort and nodePort is set
    set:
      service.type: NodePort
      service.nodePort: 30080
    asserts:
      - equal:
          path: spec.ports[0].nodePort
          value: 30080

  - it: should not include nodePort when type is ClusterIP
    set:
      service.type: ClusterIP
      service.nodePort: 30080
    asserts:
      - notExists:
          path: spec.ports[0].nodePort

  - it: should not include nodePort when type is NodePort but nodePort is empty
    set:
      service.type: NodePort
      service.nodePort: ""
    asserts:
      - notExists:
          path: spec.ports[0].nodePort

  - it: should set selector labels matching deployment
    set:
      name: my-app
    asserts:
      - equal:
          path: spec.selector["app.kubernetes.io/name"]
          value: my-app

  - it: should include annotations when provided
    set:
      service.annotations:
        service.beta.kubernetes.io/aws-load-balancer-type: nlb
    asserts:
      - equal:
          path: metadata.annotations["service.beta.kubernetes.io/aws-load-balancer-type"]
          value: nlb

  - it: should not include annotations when empty
    set:
      service.annotations: {}
    asserts:
      - notExists:
          path: metadata.annotations
