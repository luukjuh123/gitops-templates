suite: CronJob ServiceAccount template tests
templates:
  - templates/serviceaccount.yaml
tests:
  - it: should render a ServiceAccount when serviceAccount.create is true (default)
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ServiceAccount
      - equal:
          path: apiVersion
          value: v1

  - it: should not render when serviceAccount.create is false
    set:
      serviceAccount.create: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should use the fullname for metadata.name when no name is given
    set:
      name: my-job
    asserts:
      - equal:
          path: metadata.name
          value: my-job

  - it: should use serviceAccount.name when explicitly set
    set:
      serviceAccount.name: custom-sa
    asserts:
      - equal:
          path: metadata.name
          value: custom-sa

  - it: should include standard labels
    asserts:
      - isNotEmpty:
          path: metadata.labels["helm.sh/chart"]
      - isNotEmpty:
          path: metadata.labels["app.kubernetes.io/name"]

  - it: should set annotations when provided
    set:
      serviceAccount.annotations:
        eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/my-role
    asserts:
      - equal:
          path: metadata.annotations["eks.amazonaws.com/role-arn"]
          value: arn:aws:iam::123456789012:role/my-role

  - it: should not render annotations key when empty
    asserts:
      - notExists:
          path: metadata.annotations
