suite: CronJob ConfigMap template tests
templates:
  - templates/configmap.yaml
tests:
  - it: should not render when configMap.enabled is false (default)
    asserts:
      - hasDocuments:
          count: 0

  - it: should render a ConfigMap when configMap.enabled is true
    set:
      configMap.enabled: true
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ConfigMap
      - equal:
          path: apiVersion
          value: v1

  - it: should use the fullname for metadata.name
    set:
      name: my-job
      configMap.enabled: true
    asserts:
      - equal:
          path: metadata.name
          value: my-job

  - it: should include standard labels
    set:
      configMap.enabled: true
    asserts:
      - isNotEmpty:
          path: metadata.labels["helm.sh/chart"]
      - isNotEmpty:
          path: metadata.labels["app.kubernetes.io/name"]

  - it: should populate key-value pairs in data
    set:
      configMap.enabled: true
      configMap.data.SCHEDULE: "daily"
      configMap.data.BATCH_SIZE: "100"
    asserts:
      - equal:
          path: data.SCHEDULE
          value: "daily"
      - equal:
          path: data.BATCH_SIZE
          value: "100"

  - it: should render an empty data section when configMap.data is empty
    set:
      configMap.enabled: true
      configMap.data: {}
    asserts:
      - isEmpty:
          path: data
