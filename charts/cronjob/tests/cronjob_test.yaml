suite: CronJob template tests
templates:
  - templates/cronjob.yaml
tests:
  - it: should render a CronJob by default
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: CronJob
      - equal:
          path: apiVersion
          value: batch/v1

  - it: should use the name for metadata.name
    set:
      name: my-job
    asserts:
      - equal:
          path: metadata.name
          value: my-job

  - it: should include standard labels
    asserts:
      - isNotEmpty:
          path: metadata.labels["helm.sh/chart"]
      - isNotEmpty:
          path: metadata.labels["app.kubernetes.io/name"]
      - isNotEmpty:
          path: metadata.labels["app.kubernetes.io/instance"]

  - it: should set the schedule from values
    set:
      schedule: "*/5 * * * *"
    asserts:
      - equal:
          path: spec.schedule
          value: "*/5 * * * *"

  - it: should set concurrencyPolicy from values
    set:
      concurrencyPolicy: Allow
    asserts:
      - equal:
          path: spec.concurrencyPolicy
          value: Allow

  - it: should set successfulJobsHistoryLimit from values
    set:
      successfulJobsHistoryLimit: 5
    asserts:
      - equal:
          path: spec.successfulJobsHistoryLimit
          value: 5

  - it: should set failedJobsHistoryLimit from values
    set:
      failedJobsHistoryLimit: 3
    asserts:
      - equal:
          path: spec.failedJobsHistoryLimit
          value: 3

  - it: should set startingDeadlineSeconds when provided
    set:
      startingDeadlineSeconds: 60
    asserts:
      - equal:
          path: spec.startingDeadlineSeconds
          value: 60

  - it: should not set startingDeadlineSeconds when empty
    set:
      startingDeadlineSeconds: ""
    asserts:
      - notExists:
          path: spec.startingDeadlineSeconds

  - it: should set activeDeadlineSeconds when provided
    set:
      activeDeadlineSeconds: 300
    asserts:
      - equal:
          path: spec.jobTemplate.spec.activeDeadlineSeconds
          value: 300

  - it: should not set activeDeadlineSeconds when empty
    set:
      activeDeadlineSeconds: ""
    asserts:
      - notExists:
          path: spec.jobTemplate.spec.activeDeadlineSeconds

  - it: should set the container image from values
    set:
      image.repository: my-registry/my-image
      image.tag: "2.0"
    asserts:
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].image
          value: my-registry/my-image:2.0

  - it: should set restartPolicy in the pod template
    set:
      restartPolicy: Never
    asserts:
      - equal:
          path: spec.jobTemplate.spec.template.spec.restartPolicy
          value: Never

  - it: should include serviceAccountName when serviceAccount.create is true
    set:
      name: my-job
      serviceAccount.create: true
    asserts:
      - equal:
          path: spec.jobTemplate.spec.template.spec.serviceAccountName
          value: my-job

  - it: should not include serviceAccountName when serviceAccount.create is false
    set:
      serviceAccount.create: false
    asserts:
      - notExists:
          path: spec.jobTemplate.spec.template.spec.serviceAccountName

  - it: should set env variables when provided
    set:
      env:
        - name: MY_VAR
          value: "hello"
    asserts:
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].env[0].name
          value: MY_VAR
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].env[0].value
          value: "hello"

  - it: should set resource requests and limits from values
    set:
      resources.requests.cpu: 200m
      resources.limits.memory: 512Mi
    asserts:
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].resources.requests.cpu
          value: 200m
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].resources.limits.memory
          value: 512Mi

  - it: should set nodeSelector when provided
    set:
      nodeSelector:
        disktype: ssd
    asserts:
      - equal:
          path: spec.jobTemplate.spec.template.spec.nodeSelector.disktype
          value: ssd

  - it: should set pod labels from podLabels
    set:
      podLabels:
        team: platform
    asserts:
      - equal:
          path: spec.jobTemplate.spec.template.metadata.labels["team"]
          value: platform

  - it: should set pod annotations from podAnnotations
    set:
      podAnnotations:
        prometheus.io/scrape: "true"
    asserts:
      - equal:
          path: spec.jobTemplate.spec.template.metadata.annotations["prometheus.io/scrape"]
          value: "true"

  - it: should add imagePullSecrets when provided
    set:
      imagePullSecrets:
        - my-secret
    asserts:
      - equal:
          path: spec.jobTemplate.spec.template.spec.imagePullSecrets[0].name
          value: my-secret
