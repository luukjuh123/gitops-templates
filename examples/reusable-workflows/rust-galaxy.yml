# Example: How a Rust galaxy's CI uses gitops-templates reusable workflows
name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    uses: luukjuh123/gitops-templates/.github/workflows/rust-quality.yml@main

  test:
    needs: quality
    uses: luukjuh123/gitops-templates/.github/workflows/rust-test.yml@main

  build:
    needs: test
    uses: luukjuh123/gitops-templates/.github/workflows/rust-build.yml@main
