apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Reference the shared base (ServiceAccount, Deployment, Service).
resources:
  - ../../base

# Opt in to optional components.
# Remove any component your app doesn't need.
components:
  - ../../components/ingress
  - ../../components/configmap

patches:
  - path: deployment-patch.yaml
    target:
      kind: Deployment
      name: app
  - path: ingress-patch.yaml
    target:
      kind: Ingress
      name: app
