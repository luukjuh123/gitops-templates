apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Core resources included by default.
# Optional resources (Ingress, HPA, ConfigMap) are in ../components/.
# Reference them in your overlay's kustomization.yaml via the `components:` field.
resources:
  - serviceaccount.yaml
  - deployment.yaml
  - service.yaml
