apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-name
  labels:
    app.kubernetes.io/name: app-name
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: app-name
  template:
    metadata:
      labels:
        app.kubernetes.io/name: app-name
    spec:
      serviceAccountName: app-name
      containers:
        - name: app-name
          image: app-name:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
