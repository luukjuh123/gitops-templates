# cargo-deny configuration — maintained by PR Sentinel
# https://embarkstudios.github.io/cargo-deny/

[advisories]
# Fail on any known security vulnerability
ignore = []
unmaintained = "warn"
yanked = "warn"

[bans]
# Avoid multiple versions of the same crate where possible
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
