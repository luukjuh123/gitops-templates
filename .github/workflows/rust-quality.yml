# ci-template-version: 1.3
name: Rust quality checks

on:
  workflow_call:
    inputs:
      rust-channel:
        description: Rust toolchain channel
        type: string
        default: stable
      working-directory:
        description: Directory containing Cargo.toml
        type: string
        default: '.'

jobs:
  quality:
    name: Quality (fmt · clippy · deny)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    env:
      RUSTFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@v4
      - uses: luukjuh123/gitops-templates/.github/actions/setup-rust@main
        with:
          rust-channel: ${{ inputs.rust-channel }}
          components: rustfmt,clippy
      - name: cargo fmt — format check
        run: cargo fmt --all -- --check
      - name: cargo clippy — lint
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: cargo deny — CVE + duplicates
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories bans sources
          manifest-path: ${{ inputs.working-directory }}/Cargo.toml
