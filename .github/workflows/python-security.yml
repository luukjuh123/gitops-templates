# ci-template-version: 1.1
name: Python security scan

on:
  workflow_call: {}

jobs:
  bandit:
    name: bandit (SAST)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install bandit
        run: pip install "bandit[toml]"
      - name: Run bandit
        run: bandit -r src/ -c pyproject.toml -ll

  pip-audit:
    name: pip-audit (dependency CVEs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install pip-audit and uv
        run: pip install pip-audit uv
      - name: Export dependencies and audit
        run: |
          uv export --no-dev --no-emit-project --format requirements-txt -o /tmp/requirements.txt
          pip-audit -r /tmp/requirements.txt --desc --progress-spinner off
