# ci-template-version: 1.1
name: TypeScript security scan

on:
  workflow_call:
    inputs:
      working-directory:
        description: Directory containing package.json
        type: string
        default: '.'

jobs:
  npm-audit:
    name: npm audit (dependency CVEs)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4
      - uses: luukjuh123/gitops-templates/.github/actions/setup-node@main
        with:
          working-directory: ${{ inputs.working-directory }}
      - name: Audit for high/critical CVEs
        run: npm audit --audit-level=high

  license-check:
    name: license checker
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4
      - uses: luukjuh123/gitops-templates/.github/actions/setup-node@main
        with:
          working-directory: ${{ inputs.working-directory }}
      - name: Install license-checker
        run: npm install -g license-checker
      - name: Check for prohibited licenses
        run: |
          license-checker \
            --excludePrivatePackages \
            --failOn "GPL-2.0;GPL-3.0;AGPL-1.0;AGPL-3.0;LGPL-2.0;LGPL-2.1;LGPL-3.0" \
            --summary
