# ci-template-version: 1.0
name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Lint, format, type-check, security ────────────────────────────────────
  quality:
    name: Code quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Ruff — lint
        run: uv run ruff check . --output-format=github

      - name: Ruff — format check
        run: uv run ruff format --check .

      - name: ty — type check
        run: uv run ty check src/

      - name: Bandit — security scan
        run: uv run bandit -r src/ -c pyproject.toml -f github

      - name: Safety — dependency CVE check
        run: uv run safety scan --policy-file .safety-policy.yml || true

      - name: Codespell — spell check
        run: uv run codespell src/ tests/ --skip="*.lock,*.json"

      - name: Pre-commit — all hooks
        uses: pre-commit/action@v3.0.1

  # ── Tests + coverage ──────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Run pytest
        run: |
          uv run pytest \
            --cov=src \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=80 \
            -v

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: coverage.xml
          fail_ci_if_error: false
