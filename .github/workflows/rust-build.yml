# ci-template-version: 1.1
name: Rust release build

on:
  workflow_call:
    inputs:
      rust-channel:
        type: string
        default: stable
      working-directory:
        description: Directory containing Cargo.toml
        type: string
        default: '.'

jobs:
  build:
    name: cargo build --release
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4
      - uses: luukjuh123/gitops-templates/.github/actions/setup-rust@main
        with:
          rust-channel: ${{ inputs.rust-channel }}
      - name: cargo build — release
        run: cargo build --release --all-features
