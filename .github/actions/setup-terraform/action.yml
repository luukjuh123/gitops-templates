name: Setup Terraform + tflint
description: Installs Terraform and tflint for infrastructure validation

inputs:
  terraform-version:
    description: Terraform version
    required: false
    default: '1.7.0'

runs:
  using: composite
  steps:
    - uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ inputs.terraform-version }}
    - name: Install tflint
      shell: bash
      run: |
        curl -s https://raw.githubusercontent.com/terraform-linters/tflint/master/install_linux.sh | bash
